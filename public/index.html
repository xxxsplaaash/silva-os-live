<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Silva OS</title>
  <link rel="stylesheet" href="/app-static/css/tokens.css" />
  <link rel="stylesheet" href="/app-static/css/base.css" />
  <link rel="stylesheet" href="/app-static/css/layout.css" />
  <link rel="stylesheet" href="/app-static/css/components.css" />
  <link rel="stylesheet" href="/app-static/css/pages.css" />
</head>
<body>
  <div class="shell">
    <aside class="shell-sidebar">
      <div class="brand-block">
        <div class="brand-mark">SS</div>
        <div>
          <div class="brand-title">Silva Studios</div>
          <div class="brand-sub">AI Division OS <span class="version-pill" data-silva-version></span></div>
        </div>
      </div>

      <nav id="silva-nav" class="nav"></nav>

      <div class="sidebar-footer">
        <a class="ghost-link" href="/legacy">Open legacy app</a>
      </div>
    </aside>

    <main class="shell-main">
      <header class="topbar">
        <div>
          <div class="eyebrow">Public Runtime Preview</div>
          <h1 id="page-title">Silva OS</h1>
        </div>
        <div class="topbar-actions">
          <span class="topbar-badge">Phase 1</span>
          <span class="topbar-badge" data-silva-version></span>
        </div>
      </header>

      <section id="page-host" class="page-host"></section>
    </main>
  </div>

  <script src="/app-static/js/app.js"></script>
</body>
</html>
